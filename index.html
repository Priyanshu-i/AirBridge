<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>LocalShare P2P</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#F3EDF7" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      /* Material 3 Design Tokens */
      :root {
        --md-sys-color-primary: #6750a4;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-primary-container: #eaddff;
        --md-sys-color-on-primary-container: #21005d;
        --md-sys-color-surface: #fef7ff;
        --md-sys-color-on-surface: #1d1b20;
        --md-sys-color-surface-container: #f3edf7;
        font-family:
          system-ui,
          -apple-system,
          Roboto,
          sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        background-color: var(--md-sys-color-surface);
        padding: 16px;
        text-align: center;
        font-size: 22px;
        font-weight: 500;
        border-bottom: 1px solid #e7e0ec;
      }

      .main-view {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .tabs {
        display: flex;
        background: var(--md-sys-color-surface);
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 14px;
        font-weight: 500;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: 0.2s;
      }
      .tab.active {
        color: var(--md-sys-color-primary);
        border-bottom: 2px solid var(--md-sys-color-primary);
      }

      .container {
        flex: 1;
        padding: 16px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .container.active {
        display: flex;
      }
      .card {
        background: var(--md-sys-color-surface-container);
        padding: 24px;
        border-radius: 16px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-sizing: border-box;
      }

      .btn {
        background-color: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
        border: none;
        border-radius: 100px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
      }
      .btn-secondary {
        background-color: var(--md-sys-color-primary-container);
        color: var(--md-sys-color-on-primary-container);
      }

      input[type="file"] {
        display: none;
      }
      #reader {
        width: 100%;
        border-radius: 16px;
        overflow: hidden;
        margin-top: 16px;
      }
      #qr-canvas {
        margin: 16px auto;
        border-radius: 8px;
      }

      /* SYSTEM DIAGNOSTICS TERMINAL */
      .terminal-container {
        background: #121212;
        color: #00ff00;
        font-family: monospace;
        font-size: 11px;
        padding: 12px;
        height: 180px;
        overflow-y: auto;
        width: 100%;
        box-sizing: border-box;
        border-top: 3px solid #333;
      }
      .terminal-header {
        color: #888;
        border-bottom: 1px solid #333;
        padding-bottom: 6px;
        margin-bottom: 6px;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .log-error {
        color: #ff5555;
      }
      .log-warn {
        color: #ffb86c;
      }
    </style>
  </head>
  <body>
    <header>LocalShare P2P</header>

    <div class="main-view">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('sender')">Send File</div>
        <div class="tab" onclick="switchTab('receiver')">Receive File</div>
      </div>

      <!-- SENDER TAB -->
      <div id="sender" class="container active">
        <div class="card" id="sender-setup">
          <h3>1. Select a File</h3>
          <label class="btn" for="file-input">Choose File</label>
          <input
            type="file"
            id="file-input"
            onchange="handleFileSelect(event)"
          />
          <p
            id="file-name"
            style="font-size: 13px; margin-top: 8px; font-weight: bold"
          ></p>
        </div>

        <div class="card" id="sender-qr-card" style="display: none">
          <h3>2. Receiver Scans This</h3>
          <canvas id="sender-qr-canvas"></canvas>
          <button class="btn btn-secondary" onclick="startScanner('sender')">
            3. Scan Receiver's Answer
          </button>
        </div>
      </div>

      <!-- RECEIVER TAB -->
      <div id="receiver" class="container">
        <div class="card" id="receiver-setup">
          <h3>1. Connect to Sender</h3>
          <button class="btn" onclick="startScanner('receiver')">
            Scan Sender's QR
          </button>
          <p style="font-size: 12px; margin-top: 8px">
            Or open autofill link from camera.
          </p>
        </div>

        <div class="card" id="receiver-qr-card" style="display: none">
          <h3>2. Sender Scans This</h3>
          <canvas id="receiver-qr-canvas"></canvas>
        </div>
      </div>

      <!-- SHARED SCANNER & TRANSFER UI -->
      <div class="container" id="scanner-container">
        <div class="card">
          <div id="reader"></div>
          <button class="btn btn-secondary" onclick="stopScanner()">
            Cancel Scan
          </button>
        </div>
      </div>

      <div class="container" id="transfer-container">
        <div class="card">
          <h3 id="transfer-status">Connected!</h3>
          <progress
            id="progress-bar"
            value="0"
            max="100"
            style="width: 100%; height: 12px; border-radius: 6px"
          ></progress>
          <a
            id="download-link"
            class="btn"
            style="display: none; text-decoration: none"
            download
            >Save File</a
          >
        </div>
      </div>
    </div>

    <!-- DIAGNOSTICS LOG -->
    <div class="terminal-container">
      <div class="terminal-header">System Diagnostics</div>
      <div id="terminal-log"></div>
    </div>

    <script>
      // --- APP STATE ---
      let mode = "sender";
      let pc = new RTCPeerConnection({ iceServers: [] });
      let dataChannel;
      let fileToSend = null;
      let html5QrcodeScanner = null;

      // --- TERMINAL LOGGER ---
      function logTerminal(msg, type = "info") {
        const logBox = document.getElementById("terminal-log");
        const time = new Date().toLocaleTimeString([], { hour12: false });
        const entry = document.createElement("div");
        entry.className =
          type === "error" ? "log-error" : type === "warn" ? "log-warn" : "";
        entry.innerText = `[${time}] ${msg}`;
        logBox.appendChild(entry);
        logBox.scrollTop = logBox.scrollHeight;
      }

      // --- COMPRESSION LOGIC (Raw Tokens) ---
      function compressToken(desc) {
        const payload = JSON.stringify({ s: desc.sdp, t: desc.type });
        const deflated = pako.deflate(payload);
        return btoa(String.fromCharCode.apply(null, deflated))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      function decompressToken(token) {
        const b64 = token.replace(/-/g, "+").replace(/_/g, "/");
        const bytes = new Uint8Array(
          atob(b64)
            .split("")
            .map((c) => c.charCodeAt(0)),
        );
        return JSON.parse(pako.inflate(bytes, { to: "string" }));
      }

      // --- UI NAVIGATION ---
      function switchTab(newMode) {
        mode = newMode;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".container")
          .forEach((c) => (c.style.display = "none"));
        document
          .querySelector(`.tab:nth-child(${mode === "sender" ? 1 : 2})`)
          .classList.add("active");
        document.getElementById(mode).style.display = "flex";
        logTerminal(`Switched to ${mode} mode`);
      }

      // --- WEBRTC CORE EVENTS ---
      pc.onconnectionstatechange = () =>
        logTerminal(`WebRTC State: ${pc.connectionState}`);
      pc.onsignalingstatechange = () =>
        logTerminal(`Signaling: ${pc.signalingState}`);

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          logTerminal(
            `ICE Candidate: ${e.candidate.address || e.candidate.candidate.split(" ")[4] || "mDNS/Local"}`,
          );
        }
      };

      pc.oniceconnectionstatechange = () => {
        logTerminal(`ICE Connection: ${pc.iceConnectionState}`);
        if (
          pc.iceConnectionState === "connected" ||
          pc.iceConnectionState === "completed"
        ) {
          showTransferUI();
        } else if (pc.iceConnectionState === "failed") {
          logTerminal(
            "FAILED: Devices cannot see each other on this Wi-Fi/Hotspot.",
            "error",
          );
        }
      };

      function setupDataChannel(channel) {
        channel.binaryType = "arraybuffer";
        channel.onopen = () => {
          logTerminal("Data Channel OPEN", "info");
          showTransferUI();
          if (mode === "sender") sendFile();
        };

        let receiveBuffer = [];
        let receivedSize = 0;
        let currentMeta = null;

        channel.onmessage = async (e) => {
          // 1. Receive Metadata First
          if (typeof e.data === "string") {
            currentMeta = JSON.parse(e.data);
            if (currentMeta.type === "meta") {
              logTerminal(`Incoming file detected: ${currentMeta.name}`);
              document.getElementById("transfer-status").innerText =
                `Receiving ${currentMeta.name}...`;
              document.getElementById("progress-bar").max = currentMeta.size;
            }
          }
          // 2. Receive Raw File Chunks
          else {
            receiveBuffer.push(e.data);
            receivedSize += e.data.byteLength;
            document.getElementById("progress-bar").value = receivedSize;

            if (receivedSize >= currentMeta.size) {
              logTerminal(`File transfer complete! Compiling blob...`);

              // Reconstruct file with correct MIME type
              const blob = new Blob(receiveBuffer, {
                type: currentMeta.mime || "application/octet-stream",
              });
              const link = document.getElementById("download-link");

              // Critical Fix: Hardcode the exact original filename to the download attribute
              link.href = URL.createObjectURL(blob);
              link.download = currentMeta.name;

              link.style.display = "block";
              document.getElementById("transfer-status").innerText =
                "Transfer Complete!";
              receiveBuffer = [];
              receivedSize = 0;
            }
          }
        };
      }

      // --- SENDER LOGIC ---
      async function handleFileSelect(event) {
        fileToSend = event.target.files[0];
        if (!fileToSend) return;
        document.getElementById("file-name").innerText = fileToSend.name;
        logTerminal(`Selected: ${fileToSend.name}`);

        dataChannel = pc.createDataChannel("fileTransfer");
        setupDataChannel(dataChannel);

        let qrGenerated = false;
        const generateQR = () => {
          if (qrGenerated) return;
          qrGenerated = true;
          logTerminal("Local IPs found. Generating QR Offer.");
          const token = compressToken(pc.localDescription);
          const url = `${window.location.origin}${window.location.pathname}?t=${token}`;
          new QRious({
            element: document.getElementById("sender-qr-canvas"),
            value: url,
            size: 200,
            level: "M",
          });
          document.getElementById("sender-setup").style.display = "none";
          document.getElementById("sender-qr-card").style.display = "block";
        };

        // Critical Fix: Wait for ICE gathering to COMPLETE before making QR
        pc.onicegatheringstatechange = () => {
          logTerminal(`Gathering: ${pc.iceGatheringState}`);
          if (pc.iceGatheringState === "complete") generateQR();
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Fallback in case browser hangs on 'complete' event
        setTimeout(generateQR, 2000);
      }

      async function sendFile() {
        logTerminal(`Sending meta: ${fileToSend.name}`);
        // Send formatting info first
        dataChannel.send(
          JSON.stringify({
            type: "meta",
            name: fileToSend.name,
            size: fileToSend.size,
            mime: fileToSend.type,
          }),
        );

        const chunkSize = 16384;
        let offset = 0;

        while (offset < fileToSend.size) {
          // Critical Stability Fix: Prevent the browser buffer from overflowing on large files
          while (dataChannel.bufferedAmount > 1024 * 1024 * 2) {
            await new Promise((r) => setTimeout(r, 10));
          }

          const slice = fileToSend.slice(offset, offset + chunkSize);
          const buffer = await slice.arrayBuffer();

          dataChannel.send(buffer);
          offset += buffer.byteLength;

          if (offset % (chunkSize * 10) === 0) {
            // Throttle UI updates
            document.getElementById("progress-bar").value = offset;
          }
        }
        document.getElementById("progress-bar").value = fileToSend.size;
        logTerminal(`Finished sending bytes.`);
        document.getElementById("transfer-status").innerText =
          "Sent Successfully!";
      }

      // --- RECEIVER LOGIC ---
      pc.ondatachannel = (event) => setupDataChannel(event.channel);

      async function processOffer(token) {
        logTerminal(`Processing Sender Offer...`);
        const data = decompressToken(token);
        await pc.setRemoteDescription(
          new RTCSessionDescription({ type: data.t, sdp: data.s }),
        );

        let answerGenerated = false;
        const generateAnswerQR = () => {
          if (answerGenerated) return;
          answerGenerated = true;
          logTerminal(`Answer Ready. Generating QR.`);
          const answerToken = compressToken(pc.localDescription);
          new QRious({
            element: document.getElementById("receiver-qr-canvas"),
            value: answerToken,
            size: 200,
            level: "M",
          });
          document.getElementById("receiver-setup").style.display = "none";
          document.getElementById("receiver-qr-card").style.display = "block";
        };

        pc.onicegatheringstatechange = () => {
          logTerminal(`Gathering (Answer): ${pc.iceGatheringState}`);
          if (pc.iceGatheringState === "complete") generateAnswerQR();
        };

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        setTimeout(generateAnswerQR, 2000);
      }

      // --- SCANNER LOGIC ---
      function startScanner(target) {
        document
          .querySelectorAll(".container")
          .forEach((c) => (c.style.display = "none"));
        document.getElementById("scanner-container").style.display = "flex";
        logTerminal(`Camera scanner opened for ${target}`);

        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          async (decodedText) => {
            stopScanner();
            logTerminal(`QR Scanned Successfully!`);
            try {
              if (target === "receiver") {
                const url = new URL(decodedText);
                const token = url.searchParams.get("t");
                if (token) processOffer(token);
              } else if (target === "sender") {
                const data = decompressToken(decodedText);
                await pc.setRemoteDescription(
                  new RTCSessionDescription({ type: data.t, sdp: data.s }),
                );
              }
            } catch (e) {
              logTerminal(`Scan error: ${e.message}`, "error");
            }
          },
          () => {
            /* Ignore constant scan failures */
          },
        );
      }

      function stopScanner() {
        if (html5QrcodeScanner) {
          html5QrcodeScanner.stop();
          document.getElementById("scanner-container").style.display = "none";
          document.getElementById(mode).style.display = "flex";
        }
      }

      function showTransferUI() {
        document
          .querySelectorAll(".container")
          .forEach((c) => (c.style.display = "none"));
        document.getElementById("transfer-container").style.display = "flex";
      }

      // --- AUTOFILL URL CHECK ---
      window.onload = () => {
        logTerminal("App loaded and ready.");
        if ("serviceWorker" in navigator)
          navigator.serviceWorker.register("sw.js");
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("t");
        if (token) {
          logTerminal("Autofill Token detected in URL");
          switchTab("receiver");
          processOffer(token);
          window.history.replaceState(
            {},
            document.title,
            window.location.pathname,
          );
        }
      };
    </script>
  </body>
</html>
